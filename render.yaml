services:
  - type: web
    name: sml-rails
    env: docker
    dockerfilePath: ./Dockerfile.rails
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: XRPL_NETWORK
        value: mainnet
      - key: XRPL_WS_MAINNET
        value: wss://xrplcluster.com
      - key: OPERATOR_WALLET_SEED
        sync: false
      - key: DISCORD_WEBHOOK_RAILS
        sync: false
      - key: RAILS_PORT
        value: "8002"

  - type: redis
    name: forge-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: forge-gateway
    env: docker
    dockerfilePath: ./x402-gateway/Dockerfile
    dockerContext: ./x402-gateway
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: forge-redis
          property: connectionString
      - key: MERCHANT_WALLET_ADDRESS
        sync: false
      - key: PAYMENT_AMOUNT_USDC_DROPS
        value: "500000"
      - key: X402_FACILITATOR_URL
        value: "https://x402.org/facilitator"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BYOK_PROVIDER
        value: "auto"
      - key: XRPL_NOTARY_WALLET_ADDRESS
        sync: false
      - key: XRPL_NOTARY_WALLET_SEED
        sync: false
      - key: XRPL_NETWORK
        value: "mainnet"
      - key: XRPL_RPC_URL
        value: "https://xrplcluster.com"
      - key: RATE_LIMIT_RPM
        value: "60"

  - type: web
    name: shadow-desk
    env: docker
    dockerfilePath: ./shadow-desk/Dockerfile
    dockerContext: ./shadow-desk
    plan: starter
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8080"
      - key: HOST_URL
        value: "https://shadow-desk.onrender.com"
      - key: INGEST_SECRET
        sync: false
      - key: ALPHA_PROVIDER_WALLET
        sync: false
      - key: PLATFORM_WALLET
        sync: false
      - key: FACILITATOR_URL
        value: "https://x402.org/facilitator"
      - key: ADMIN_API_KEY
        sync: false

  - type: pgsql
    name: sml-copytrader-db
    plan: starter
    ipAllowList: []

  - type: web
    name: sml-copytrader
    env: docker
    dockerfilePath: ./Dockerfile.copytrader
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: COPYTRADER_DB_URL
        fromService:
          type: pgsql
          name: sml-copytrader-db
          property: connectionString
      - key: OPERATOR_WALLET_SEED
        sync: false
      - key: OPERATOR_WALLET_ADDRESS
        sync: false
      - key: XRPL_NETWORK
        value: "mainnet"
      - key: XRPL_RPC_URL
        value: "https://xrplcluster.com"
      - key: XRPL_WS_MAINNET
        value: "wss://xrplcluster.com"
      - key: DISCORD_WEBHOOK_COPYTRADER
        sync: false

  - type: pgsql
    name: sml-launchpad-db
    plan: starter
    ipAllowList: []

  - type: web
    name: sml-launchpad
    env: docker
    dockerfilePath: ./Dockerfile.launchpad
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: LAUNCHPAD_DB_URL
        fromService:
          type: pgsql
          name: sml-launchpad-db
          property: connectionString
      - key: OPERATOR_WALLET_SEED
        sync: false
      - key: OPERATOR_WALLET_ADDRESS
        sync: false
      - key: XRPL_NETWORK
        value: "mainnet"
      - key: XRPL_RPC_URL
        value: "https://xrplcluster.com"
      - key: DISCORD_WEBHOOK_LAUNCHPAD
        sync: false

  - type: web
    name: sml-forge-dashboard
    env: static
    buildCommand: cd dashboard && npm install && npm run build
    staticPublishPath: ./dashboard/dist
    autoDeploy: true
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    envVars:
      - key: VITE_GATEWAY_URL
        value: "https://forge-gateway-a822.onrender.com"
