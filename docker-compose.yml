version: '3.9'

services:
  # -------------------------------------------------------------------------
  # Redis — rate limiting & metrics store
  # -------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning --requirepass "${REDIS_PASSWORD:-changeme}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gateway

  # -------------------------------------------------------------------------
  # x402 Gateway — Go HTTP server
  # -------------------------------------------------------------------------
  x402-gateway:
    build:
      context: ./x402-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: "8080"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme}@redis:6379"
      RATE_LIMIT_RPM: "${RATE_LIMIT_RPM:-60}"
      MERCHANT_WALLET_ADDRESS: "${MERCHANT_WALLET_ADDRESS}"
      PAYMENT_AMOUNT_USDC_DROPS: "${PAYMENT_AMOUNT_USDC_DROPS:-500000}"
      X402_FACILITATOR_URL: "${X402_FACILITATOR_URL:-https://x402.org/facilitator}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      BYOK_PROVIDER: "${BYOK_PROVIDER:-auto}"
      XRPL_NOTARY_WALLET_ADDRESS: "${XRPL_NOTARY_WALLET_ADDRESS}"
      XRPL_NOTARY_WALLET_SEED: "${XRPL_NOTARY_WALLET_SEED}"
      XRPL_NETWORK: "${XRPL_NETWORK:-testnet}"
      XRPL_RPC_URL: "${XRPL_RPC_URL:-}"
    expose:
      - "8080"
    networks:
      - gateway
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # -------------------------------------------------------------------------
  # Dashboard — React + Vite (production build served by nginx)
  # -------------------------------------------------------------------------
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - gateway

  # -------------------------------------------------------------------------
  # Nginx — reverse proxy + TLS termination
  # -------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - x402-gateway
      - dashboard
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - gateway

volumes:
  redis_data:

networks:
  gateway:
    driver: bridge
